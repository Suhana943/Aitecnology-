name: Generate HTML Files

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Ab aap GitHub par "Run workflow" button se ise manually chala payenge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Ye permission zaroori hai files save karne ke liye
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Script
        run: python3 generate_files.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # Sirf tabhi commit karein agar koi badlav hua ho
          git commit -m "Auto-generated 146 HTML files" || echo "No changes to commit"
          git push
          
