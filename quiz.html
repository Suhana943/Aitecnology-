<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Tech Quiz</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<h2 id="title">Loading...</h2>
<div id="box"></div>

<script>
    // URL se topic nikalna
    const urlParams = new URLSearchParams(window.location.search);
    const topic = urlParams.get('topic');
    document.getElementById('title').innerText = topic || "Quiz";

    // GitHub Pages par path issues ke liye 'window.location.origin' ka use karein
    const jsonPath = window.location.origin + '/Aitecnology-/questions.json';

    fetch(jsonPath)
        .then(response => {
            if (!response.ok) throw new Error("HTTP Status " + response.status);
            return response.json();
        })
        .then(data => {
            const quizData = data.find(item => item.articleTitle.trim() === topic.trim());
            if (quizData) {
                render(quizData.questions);
            } else {
                document.getElementById('box').innerHTML = "Topic '" + topic + "' not found in JSON.";
            }
        })
        .catch(err => {
            document.getElementById('box').innerHTML = "Error: " + err + "<br>Check if questions.json exists at: " + jsonPath;
        });

    function render(questions) {
        const box = document.getElementById('box');
        questions.forEach((q, i) => {
            box.innerHTML += `<div><p>${q.question}</p></div>`;
            q.options.forEach((opt, idx) => {
                box.innerHTML += `<button class="option-btn">${opt}</button>`;
            });
        });
    }
</script>
</body>
</html>
