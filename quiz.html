<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tech Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0284c7; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding: 20px; }
        #quiz-container { max-width: 600px; margin: auto; background: #fff; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .question { margin-bottom: 15px; font-weight: 700; color: #1e293b; font-size: 1.1rem; }
        .option-btn { 
            display: block; width: 100%; padding: 12px; margin: 8px 0; 
            background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px;
            text-align: left; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .option-btn:hover { background: #e2e8f0; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
        #score-board { text-align: center; font-size: 1.2rem; font-weight: 800; margin-top: 20px; color: var(--primary); }
    </style>
</head>
<body>

<div id="quiz-container">
    <h2 id="topic-title" style="margin-bottom: 20px; color: #0f172a;"></h2>
    <div id="question-box"></div>
    <div id="score-board"></div>
</div>

<script>
    let score = 0;
    let answeredQuestions = 0;

    const params = new URLSearchParams(window.location.search);
    const topic = params.get('topic');
    document.getElementById('topic-title').innerText = topic;

    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            const quizData = data.find(item => item.articleTitle === topic);
            if (quizData) displayQuiz(quizData.questions);
            else document.getElementById('question-box').innerHTML = "<p>Questions not found.</p>";
        });

    function displayQuiz(questions) {
        const container = document.getElementById('question-box');
        container.innerHTML = "";
        questions.forEach((q, index) => {
            let optionsHTML = q.options.map((opt, i) => `
                <button class="option-btn" onclick="checkAnswer(this, ${i}, ${q.answer}, ${questions.length})">
                    ${opt}
                </button>
            `).join('');
            
            container.innerHTML += `
                <div class="question">${index + 1}. ${q.question}</div>
                <div style="margin-bottom: 30px;">${optionsHTML}</div>
            `;
        });
    }

    function checkAnswer(btn, selected, correct, total) {
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.option-btn');
        
        // Disable all buttons in this question
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            buttons[correct].classList.add('correct');
        }

        answeredQuestions++;
        
        // Final Score Display
        if(answeredQuestions === total) {
            document.getElementById('score-board').innerText = 
                `Quiz Complete! Aapka Score: ${score} / ${total}`;
        }
    }
</script>

</body>
</html>
