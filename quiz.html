<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tech Quiz</title>
    <style>
        /* General Body Styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #e0f2fe, #f0f9ff); 
            padding: 20px; 
            margin: 0; 
        }

        #quiz-container { 
            max-width: 600px; margin: auto; background: rgba(255, 255, 255, 0.8); 
            padding: 24px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
        }

        #score-board { 
            font-size: 1.3rem; font-weight: 800; color: #0369a1; 
            text-align: center; margin-bottom: 20px; padding: 10px;
            background: #e0f2fe; border-radius: 10px;
        }

        .q-block { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 15px; border-left: 5px solid #0284c7; }

        .option-btn { 
            display: block; width: 100%; padding: 14px; margin: 10px 0; 
            background: #ffffff; border: 2px solid #e2e8f0; border-radius: 10px; 
            cursor: pointer; transition: all 0.3s ease; font-weight: 600; text-align: left;
        }

        .option-btn:hover:not([disabled]) { background: #f8fafc; border-color: #0284c7; }

        .correct { background: #22c55e !important; color: white; border-color: #166534 !important; }
        .wrong { background: #ef4444 !important; color: white; border-color: #991b1b !important; }

        .feedback { margin-top: 10px; font-weight: 700; font-size: 0.95rem; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="score-board">Points: 0</div>
    <h2 id="title" style="text-align: center; color: #0f172a;">Loading...</h2>
    <div id="box"></div>
</div>

<script>
    let score = 0;
    const params = new URLSearchParams(window.location.search);
    const topic = params.get('topic');
    document.getElementById('title').innerText = topic || "Quiz";

    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            const quizData = data.find(item => item.articleTitle.trim() === topic.trim());
            if (quizData) {
                const box = document.getElementById('box');
                quizData.questions.forEach((q, qIndex) => {
                    let optionsHTML = q.options.map((opt, i) => 
                        `<button class="option-btn" onclick="check(this, ${i}, ${q.answer}, '${q.options[q.answer]}')">${opt}</button>`
                    ).join('');
                    box.innerHTML += `<div class="q-block"><p><b>${qIndex + 1}. ${q.question}</b></p>${optionsHTML}<div class="feedback"></div></div>`;
                });
            }
        });

    function check(btn, selected, correct, correctText) {
        const group = btn.parentElement;
        const btns = group.querySelectorAll('.option-btn');
        const feedback = group.querySelector('.feedback');
        
        btns.forEach(b => b.disabled = true);

        if(selected === correct) {
            score++;
            btn.classList.add('correct');
            feedback.innerHTML = "✅ Sahi Jawaab!";
            feedback.style.color = "#166534";
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
            feedback.innerHTML = "❌ Galat! Sahi jawaab: " + correctText;
            feedback.style.color = "#991b1b";
        }
        document.getElementById('score-board').innerText = "Points: " + score;
    }
</script>
</body>
</html>
