<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tech Quiz</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        #quiz-container { max-width: 600px; margin: auto; background: #fff; padding: 24px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .question { margin-bottom: 15px; font-weight: 700; color: #1e293b; font-size: 1.1rem; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; text-align: left; cursor: pointer; transition: 0.3s; }
        .option-btn:hover { background: #e2e8f0; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h2 id="topic-title">Loading...</h2>
    <div id="question-box"></div>
    <div id="score-board"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const topic = params.get('topic');
    document.getElementById('topic-title').innerText = topic || "Quiz";

    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            const quizData = data.find(item => item.articleTitle.trim() === topic.trim());
            if (quizData) renderQuiz(quizData.questions);
            else document.getElementById('question-box').innerHTML = "Questions not found.";
        });

    function renderQuiz(questions) {
        const container = document.getElementById('question-box');
        container.innerHTML = "";
        questions.forEach((q, qIndex) => {
            // Har question ke liye alag div banaya
            let options = q.options.map((opt, i) => `
                <button class="option-btn" onclick="check(this, ${i}, ${q.answer})">${opt}</button>
            `).join('');
            container.innerHTML += `<div class="q-block" style="margin-bottom:30px">
                <div class="question">${qIndex + 1}. ${q.question}</div>${options}
            </div>`;
        });
    }

    function check(btn, selected, correct) {
        // Sirf isi question ke buttons ko disable karega
        const parent = btn.parentElement;
        const btns = parent.querySelectorAll('.option-btn');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        }
    }
</script>
</body>
</html>
