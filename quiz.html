<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Tech Quiz</title>
    <style>
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #f1f5f9; border: 1px solid #cbd5e1; cursor: pointer; border-radius: 6px; }
        .correct { background: #22c55e !important; color: white; border-color: #166534 !important; }
        .wrong { background: #ef4444 !important; color: white; border-color: #991b1b !important; }
        /* Disabled button style */
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
    </style>
</head>
<body>

<h2 id="title">Loading...</h2>
<div id="box"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const topic = params.get('topic');
    document.getElementById('title').innerText = topic || "Quiz";

    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            const quizData = data.find(item => item.articleTitle.trim() === topic.trim());
            if (quizData) render(quizData.questions);
            else document.getElementById('box').innerHTML = "Topic not found.";
        });

    function render(questions) {
        const box = document.getElementById('box');
        box.innerHTML = "";
        questions.forEach((q, qIndex) => {
            let optionsHTML = q.options.map((opt, i) => 
                `<button class="option-btn" onclick="check(this, ${i}, ${q.answer})">${opt}</button>`
            ).join('');
            box.innerHTML += `<div class="q-group"><p><b>${qIndex + 1}. ${q.question}</b></p>${optionsHTML}</div>`;
        });
    }

    function check(btn, selected, correct) {
        // 1. Current question ka group dhundho
        const group = btn.closest('.q-group');
        const btns = group.querySelectorAll('.option-btn');
        
        // 2. Iss group ke saare buttons ko 'disabled' attribute do
        btns.forEach(b => b.disabled = true);

        // 3. Sahi/Galat color lagao
        if(selected === correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct'); // Sahi answer highlight karo
        }
    }
</script>
</body>
</html>
