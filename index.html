<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiTechnology | Modern Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --brand: #2563eb; --bg: #f8fafc; --text: #0f172a; --muted: #64748b; --border: #e2e8f0; }
        body { background: var(--bg); color: var(--text); padding-bottom: 40px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .content-wrapper { padding: 24px; max-width: 600px; margin: 0 auto; }
        
        .list-item { 
            background: #ffffff; border: 1px solid var(--border); border-radius: 16px; 
            padding: 20px; margin-bottom: 20px; display: flex; gap: 16px; 
            transition: 0.3s;
        }
        .list-item:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .thumb-box { width: 80px; height: 80px; background: #cbd5e1; border-radius: 12px; flex-shrink: 0; background-size: cover; background-position: center; }
        .list-meta { font-size: 0.7rem; color: var(--brand); font-weight: 800; text-transform: uppercase; }
        .list-title { font-size: 1rem; font-weight: 700; margin: 4px 0; }
        .btn-link { font-size: 0.7rem; font-weight: 800; text-decoration: none; padding: 6px 12px; border-radius: 6px; }
        .read-btn { background: #eff6ff; color: var(--brand); }
        .google-btn { background: #f1f5f9; color: var(--muted); }
    </style>
</head>
<body>

<main class="content-wrapper">
    <h2 style="margin-bottom: 24px; font-weight: 800;">Latest Publications</h2>
    <div id="feed"></div>
</main>

<script>
    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            const feed = document.getElementById('feed');
            data.forEach(item => {
                const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(item.title)}`;
                feed.innerHTML += `
                    <div class="list-item">
                        <div class="thumb-box" style="background-image: url('${item.image}');"></div>
                        <div class="list-info">
                            <span class="list-meta">${item.meta}</span>
                            <h3 class="list-title">${item.title}</h3>
                            <div class="action-links" style="display:flex; gap:10px; margin-top:8px;">
                                <a href="${item.link}" class="btn-link read-btn">Read Detail</a>
                                <a href="${googleSearchUrl}" target="_blank" class="btn-link google-btn">Google Search</a>
                            </div>
                        </div>
                    </div>`;
            });
        });
</script>
</body>
</html>
