<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technology | Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --primary: #0284c7; --bg: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #0f172a; padding-bottom: 40px; }

        header { 
            padding: 16px 20px; background: #fff; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand-name { font-size: 1.25rem; font-weight: 800; color: #111; }
        
        /* Drawer Styles */
        .drawer { 
            position: fixed; top: 0; left: -100%; width: 250px; height: 100%; 
            background: #fff; z-index: 1000; padding: 24px; transition: 0.3s;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .drawer.active { left: 0; }
        .menu-list { list-style: none; margin-top: 40px; }
        .menu-list li { margin-bottom: 20px; font-weight: 600; cursor: pointer; }

        .content-wrapper { padding: 20px; max-width: 500px; margin: auto; }
        .product-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .card-top { display: flex; gap: 16px; margin-bottom: 12px; }
        .product-img { width: 90px; height: 90px; object-fit: contain; }
        .quiz-btn { display: block; width: 100%; padding: 6px; margin-bottom: 12px; background: #f8fafc; border: 1px dashed var(--primary); border-radius: 6px; color: var(--primary); font-size: 0.75rem; font-weight: 600; text-align: center; text-decoration: none; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; border-radius: 6px; text-align: center; font-weight: 700; font-size: 0.8rem; text-decoration: none; }
        .btn-ai { background: #f1f5f9; color: #334155; border: 1px solid var(--border); }
        .btn-buy { background: var(--primary); color: #fff; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleDrawer()" style="cursor:pointer; font-size: 1.5rem;"><i class="fa-solid fa-bars"></i></div>
    <div class="brand-name">AI Technology</div>
    <div style="font-size: 1.2rem;"><i class="fa-solid fa-magnifying-glass"></i></div>
</header>

<!-- Drawer -->
<nav class="drawer" id="sideNav">
    <div onclick="toggleDrawer()" style="cursor:pointer; margin-bottom: 20px;"><i class="fa-solid fa-xmark fa-lg"></i></div>
    <ul class="menu-list">
        <li>Dashboard</li>
        <li>AI Models</li>
        <li style="color: var(--primary);">About Us</li>
    </ul>
</nav>

<main class="content-wrapper">
    <div id="feed"></div>
</main>

<script>
    function toggleDrawer() { document.getElementById('sideNav').classList.toggle('active'); }

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            const feed = document.getElementById('feed');
            data.forEach(item => {
                const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(item.title)}`;
                feed.innerHTML += `
                    <div class="product-card">
                        <div class="card-top">
                            <img src="${item.image}" class="product-img">
                            <div class="product-info">
                                <h3 style="font-size: 0.95rem; margin-bottom: 4px;">${item.title}</h3>
                                <span style="font-size: 0.8rem; color: #64748b;">${item.meta}</span>
                            </div>
                        </div>
                        <a href="quiz.html?topic=${encodeURIComponent(item.title)}" class="quiz-btn">
                            <i class="fa-solid fa-pen-to-square"></i> Take a Quick Quiz
                        </a>
                        <div class="card-actions">
                            <a href="${googleSearchUrl}" target="_blank" class="btn btn-ai">✨ AI Review</a>
                            <a href="${item.link}" class="btn btn-buy">Read Detail</a>
                        </div>
                    </div>`;
            });
        });
</script>
</body>
</html>
