<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --brand: #2563eb; --bg: #f8fafc; --text: #0f172a; --muted: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 40px; }

        /* Header */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        
        /* Normal Page Layout (List view instead of cards) */
        .content-wrapper { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .list-item { 
            padding: 20px 0; 
            border-bottom: 1px solid #e2e8f0; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }
        .list-item h3 { font-size: 1.1rem; line-height: 1.4; }
        .list-meta { font-size: 0.8rem; color: var(--muted); display: flex; gap: 15px; }

        /* Drawer */
        .drawer { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #fff; z-index: 100; padding: 20px; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .drawer.active { left: 0; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleDrawer()" style="cursor:pointer;"><i class="fa-solid fa-bars fa-lg"></i></div>
    <div style="font-weight: 800; letter-spacing: 1px;">RESEARCH CORE</div>
    <div><i class="fa-solid fa-bell"></i></div>
</header>

<nav class="drawer" id="sideNav">
    <div style="margin-bottom: 30px;" onclick="toggleDrawer()"><i class="fa-solid fa-xmark"></i></div>
    <ul style="list-style:none;">
        <li style="margin-bottom: 20px;">Dashboard</li>
        <li>AI Insights</li>
    </ul>
</nav>

<main class="content-wrapper">
    <h2 style="margin-bottom: 20px;">Latest Insights</h2>
    
    <div class="list-item">
        <div class="list-meta"><span>Deep Learning</span> <span>July 05, 2026</span></div>
        <h3>The Future of Autonomous Reasoning Systems</h3>
    </div>

    <div class="list-item">
        <div class="list-meta"><span>Infrastructure</span> <span>July 04, 2026</span></div>
        <h3>Optimizing GPU Clusters for Global Scale</h3>
    </div>

    <div class="list-item">
        <div class="list-meta"><span>Robotics</span> <span>July 03, 2026</span></div>
        <h3>Neural Networks in Modern Motion Control</h3>
    </div>
</main>

<script>
    function toggleDrawer() { document.getElementById('sideNav').classList.toggle('active'); }
</script>

</body>
</html>
