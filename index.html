<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technology | Research & Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #4f46e5;
            --bg: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        /* Navigation Bar & Sidebar */
        .main-header { background: #ffffff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar-close { font-size: 1.5rem; cursor: pointer; margin-bottom: 20px; }
        .nav-link { display: block; padding: 15px 0; text-decoration: none; color: var(--text); font-weight: 600; border-bottom: 1px solid #f1f5f9; }

        /* Original Content Styles */
        .ai-grid { padding: 20px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .ai-card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-body { padding: 20px; display: flex; gap: 15px; }
        .icon-holder { width: 60px; height: 60px; background: #ede9fe; display: flex; align-items: center; justify-content: center; border-radius: 15px; color: var(--primary); font-size: 1.5rem; }
        .btn-row { display: flex; border-top: 1px solid #f1f5f9; }
        .btn-row a { flex: 1; padding: 12px; text-align: center; text-decoration: none; font-weight: 600; font-size: 0.9rem; background: var(--primary); color: white; }
    </style>
</head>
<body>

<!-- Header with Menu Icon -->
<header class="main-header">
    <i class="fa-solid fa-bars" style="font-size: 1.5rem; cursor: pointer;" onclick="toggleNav()"></i>
    <div class="brand-logo" style="font-weight: 800;">AI <span style="color:var(--primary);">Technology</span></div>
    <i class="fa-solid fa-microchip" style="color:var(--primary); font-size: 1.5rem;"></i>
</header>

<!-- Sidebar Nav -->
<div class="sidebar" id="sideNav">
    <div class="sidebar-close" onclick="toggleNav()"><i class="fa-solid fa-times"></i></div>
    <a href="#" class="nav-link">Home</a>
    <a href="#" class="nav-link">Agentic Systems</a>
    <a href="#" class="nav-link">LLM Bootcamp</a>
    <a href="#" class="nav-link">Robotics Projects</a>
    <a href="#" class="nav-link">About Me</a>
</div>

<div class="ai-grid" id="aiContainer">
    <!-- Cards -->
</div>

<script>
    function toggleNav() {
        document.getElementById('sideNav').classList.toggle('active');
    }

    const aiData = [
        { title: "Mastering Agentic Design", icon: "fa-robot" },
        { title: "LLM Bootcamp Notes", icon: "fa-brain" }
    ];

    const container = document.getElementById('aiContainer');
    aiData.forEach(item => {
        container.innerHTML += `
            <div class="ai-card">
                <div class="card-body">
                    <div class="icon-holder"><i class="fa-solid ${item.icon}"></i></div>
                    <div class="info-holder">
                        <div class="card-title">${item.title}</div>
                    </div>
                </div>
                <div class="btn-row"><a href="#">Read Now</a></div>
            </div>
        `;
    });
</script>

</body>
</html>
