
        
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technology | Research & Insights</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --brand-primary: #2563eb;
            --brand-light: #eff6ff;
            --border-subtle: #e2e8f0;
            --radius-card: 20px;
            --radius-pill: 30px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-body); color: var(--text-main); line-height: 1.6; padding-bottom: 60px; }

        /* Header */
        .app-header { 
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); padding: 14px 24px; 
            border-bottom: 1px solid var(--border-subtle); 
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        .icon-action-btn { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: var(--bg-body); border: 1px solid var(--border-subtle); color: var(--text-muted); cursor: pointer; }

        /* Drawer */
        .app-drawer { 
            position: fixed; top: 0; left: -100%; width: 85%; max-width: 340px; height: 100%; 
            background: var(--bg-card); border-right: 1px solid var(--border-subtle); z-index: 2000; 
            transition: left 0.35s ease; padding: 32px 24px; box-shadow: 20px 0 50px rgba(15, 23, 42, 0.1);
        }
        .app-drawer.active { left: 0; }
        .drawer-branding { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; text-decoration: none; color: var(--text-main); font-weight: 600; border-radius: 12px; }

        /* Feed */
        .filter-track { display: flex; gap: 10px; padding: 16px 24px; overflow-x: auto; background: var(--bg-body); scrollbar-width: none; }
        .filter-pill { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 10px 20px; font-size: 0.8rem; font-weight: 700; border-radius: var(--radius-pill); cursor: pointer; white-space: nowrap; }
        .filter-pill.active { background: var(--brand-primary); color: #fff; border-color: var(--brand-primary); }

        .feed-container { padding: 24px; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 28px; }
        .magazine-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-card); overflow: hidden; }
        .card-hero { width: 100%; aspect-ratio: 16/9; background: #cbd5e1; }
        .card-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
        .meta-tag { font-size: 0.7rem; font-weight: 800; color: var(--brand-primary); background: var(--brand-light); padding: 5px 12px; border-radius: 8px; display: inline-block; }
        .action-link { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--bg-body); padding: 14px; border-radius: 14px; text-decoration: none; color: var(--text-main); font-weight: 700; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="icon-action-btn" onclick="toggleDrawer()"><i class="fa-solid fa-ellipsis-vertical"></i></div>
    <div class="header-title" style="font-weight: 800;">RESEARCH CORE</div>
    <div class="icon-action-btn"><i class="fa-solid fa-bell"></i></div>
</header>

<nav class="app-drawer" id="sideNav">
    <div class="drawer-branding">
        <div style="font-weight: 800; color: var(--brand-primary);">Platform Suite</div>
        <div class="icon-action-btn" onclick="toggleDrawer()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div class="drawer-nav">
        <a href="#" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-microchip"></i> AI Models</a>
    </div>
</nav>

<div class="filter-track">
    <div class="filter-pill active">All Topics</div>
    <div class="filter-pill">Generative AI</div>
    <div class="filter-pill">Neural Networks</div>
</div>

<main class="feed-container">
    <article class="magazine-card">
        <div class="card-hero"></div>
        <div class="card-body">
            <span class="meta-tag">DEEP LEARNING</span>
            <h2 style="font-size: 1.25rem;">The Future of Autonomous Reasoning Systems</h2>
            <p style="color: var(--text-muted);">Ek gahri nazar ki kaise naye models ab logic aur planning mein insaano ko takkar de rahe hain.</p>
            <a href="#" class="action-link">Read Full Report <i class="fa-solid fa-arrow-right"></i></a>
        </div>
    </article>
</main>

<script>
    function toggleDrawer() {
        document.getElementById('sideNav').classList.toggle('active');
    }
</script>

</body>
</html>
