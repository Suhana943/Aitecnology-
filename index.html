<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technology | Research & Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --black: #000000; --white: #ffffff; --border: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--white); color: var(--black); padding-bottom: 50px; }
        .main-header { padding: 20px; border-bottom: 2px solid var(--black); display: flex; justify-content: space-between; align-items: center; }
        .sidebar { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: var(--white); border-right: 1px solid var(--black); z-index: 2000; transition: 0.4s; padding: 30px; }
        .sidebar.active { left: 0; }
        .filter-scroll { display: flex; gap: 12px; padding: 20px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .pill { border: 1px solid var(--black); padding: 10px 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .pill.active { background: var(--black); color: var(--white); }
        .content-container { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        .ai-card { border: 1px solid var(--border); overflow: hidden; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-read { display: block; border: 1px solid var(--black); padding: 12px; text-align: center; text-decoration: none; color: var(--black); font-weight: 700; font-size: 0.85rem; margin-top: 15px; }
    </style>
</head>
<body>

<header class="main-header">
    <i class="fa-solid fa-bars" onclick="toggleNav()" style="cursor:pointer"></i>
    <div style="font-weight: 800; font-size: 1.2rem;">AI TECHNOLOGY</div>
    <i class="fa-solid fa-microchip"></i>
</header>

<div class="sidebar" id="sideNav">
    <div onclick="toggleNav()" style="cursor:pointer"><i class="fa-solid fa-times"></i></div>
    <a href="#" class="nav-link" style="margin-top:30px">Home</a>
    <a href="#" class="nav-link">Agentic Systems</a>
</div>

<section class="filter-scroll">
    <div class="pill active">All Updates</div>
    <div class="pill">Agentic</div>
    <div class="pill">LLMs</div>
</section>

<main class="content-container" id="aiContainer"></main>

<script>
    function toggleNav() { document.getElementById('sideNav').classList.toggle('active'); }

    let allData = [];

    // JSON Fetch Logic
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            allData = data;
            renderArticles(allData);
        });

    function renderArticles(data, filter = "All Updates") {
        const container = document.getElementById('aiContainer');
        container.innerHTML = '';
        data.forEach(item => {
            if(filter === "All Updates" || item.cat === filter) {
                container.innerHTML += `
                    <article class="ai-card">
                        <img src="${item.img}" class="card-img" alt="Article">
                        <div class="card-info">
                            <div class="card-title">${item.title}</div>
                            <a href="#" class="btn-read">READ ARTICLE</a>
                        </div>
                    </article>
                `;
            }
        });
    }
</script>
</body>
</html>
