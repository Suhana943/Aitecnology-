<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technology | Research & Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --grey: #f4f4f4;
            --border: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--white); color: var(--black); line-height: 1.5; padding-bottom: 30px; }

        /* Navigation Header */
        .header { padding: 20px; border-bottom: 2px solid var(--black); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
        .menu-icon { font-size: 1.2rem; cursor: pointer; }

        /* Filter Pills (Layout as requested) */
        .filter-scroll { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .pill { border: 1px solid var(--black); padding: 8px 16px; font-size: 0.75rem; font-weight: 700; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .pill.active { background: var(--black); color: var(--white); }

        /* Article Cards */
        .grid-container { padding: 20px; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .article-card { border: 1px solid var(--border); padding: 20px; }
        .article-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .article-meta { font-size: 0.8rem; color: #666; margin-bottom: 15px; text-transform: uppercase; }
        .btn-read { display: block; border: 1px solid var(--black); padding: 10px; text-align: center; text-decoration: none; color: var(--black); font-size: 0.85rem; font-weight: 700; transition: 0.2s; }
        .btn-read:hover { background: var(--black); color: var(--white); }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">AI Technology</div>
    <div class="menu-icon"><i class="fa-solid fa-bars"></i></div>
</header>

<div class="filter-scroll">
    <div class="pill active">Latest</div>
    <div class="pill">Agentic Systems</div>
    <div class="pill">LLM Research</div>
    <div class="pill">Robotics</div>
</div>

<div class="grid-container" id="articleContainer">
    </div>

<script>
    const articles = [
        { title: "Mastering Agentic Design", category: "Agentic Systems" },
        { title: "LLM Bootcamp Deep Dive", category: "LLM Research" },
        { title: "Autonomous Robotics 2026", category: "Robotics" }
    ];

    const container = document.getElementById('articleContainer');
    articles.forEach(art => {
        container.innerHTML += `
            <article class="article-card">
                <div class="article-title">${art.title}</div>
                <div class="article-meta">${art.category} • 5 min read</div>
                <a href="#" class="btn-read">READ ARTICLE</a>
            </article>
        `;
    });
</script>

</body>
</html>
