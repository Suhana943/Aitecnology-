<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Core | AI Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --brand: #2563eb; --bg: #f8fafc; --text: #0f172a; --muted: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 40px; }

        header { padding: 24px; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .content-wrapper { padding: 24px; max-width: 600px; margin: 0 auto; }
        
        /* Updated List Item Styles */
        .list-item { 
            display: flex; gap: 16px; padding: 20px 0; border-bottom: 1px solid var(--border); 
            align-items: center;
        }
        
        .thumb-box { 
            width: 80px; height: 80px; background: #cbd5e1; border-radius: 12px; flex-shrink: 0;
            background-size: cover; background-position: center; 
        }
        
        .list-info { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
        .list-meta { font-size: 0.75rem; color: var(--brand); font-weight: 700; text-transform: uppercase; }
        .list-title { font-size: 1rem; font-weight: 600; line-height: 1.4; color: inherit; text-decoration: none; }
        .list-title:hover { text-decoration: underline; }
        .list-date { font-size: 0.75rem; color: var(--muted); }

        .search-icon { color: var(--muted); cursor: pointer; font-size: 1.2rem; padding: 10px; }
        .search-icon:hover { color: var(--brand); }

        .drawer { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #fff; z-index: 100; padding: 24px; transition: 0.3s; box-shadow: 5px 0 20px rgba(0,0,0,0.05); }
        .drawer.active { left: 0; }
    </style>
</head>
<body>

<header>
    <div onclick="toggleDrawer()" style="cursor:pointer;"><i class="fa-solid fa-bars fa-lg"></i></div>
    <div style="font-weight: 800; letter-spacing: 1px;">Aitecnology</div>
    <div><i class="fa-solid fa-bell"></i></div>
</header>

<nav class="drawer" id="sideNav">
    <div style="margin-bottom: 30px; cursor:pointer;" onclick="toggleDrawer()"><i class="fa-solid fa-xmark"></i></div>
    <ul style="list-style:none; font-weight: 600;">
        <li style="margin-bottom: 20px;">Dashboard</li>
        <li>AI Models</li>
    </ul>
</nav>

<main class="content-wrapper">
    <h2 style="margin-bottom: 16px; font-weight: 800;">Latest Publications</h2>
    <div id="feed">
        <p style="color: var(--muted);">Loading latest insights...</p>
    </div>
</main>

<script>
    function toggleDrawer() { document.getElementById('sideNav').classList.toggle('active'); }

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            const feed = document.getElementById('feed');
            feed.innerHTML = ''; 
            
            data.forEach(item => {
                const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(item.title)}`;
                
                feed.innerHTML += `
                    <div class="list-item">
                        <div class="thumb-box" style="background-image: url('${item.image}');"></div>
                        <div class="list-info">
                            <span class="list-meta">${item.meta}</span>
                            <a href="${item.link}" class="list-title">${item.title}</a>
                            <span class="list-date">${item.date}</span>
                        </div>
                        <a href="${googleSearchUrl}" target="_blank" class="search-icon" title="Search on Google">
                            <i class="fa-brands fa-google"></i>
                        </a>
                    </div>`;
            });
        })
        .catch(() => {
            document.getElementById('feed').innerHTML = '<p>No publications found.</p>';
        });
</script>

</body>
</html>
